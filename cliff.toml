# git-cliff configuration for YEssential
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to YEssential (EndStone Python version) will be documented in this file.\n
"""
body = """
{%- if version -%}
    ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
        {%- if commit.breaking %} [**BREAKING**]{% endif -%}
    {%- endfor -%}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "🚀 新功能" },
    { message = "^fix", group = "🐛 修复" },
    { message = "^docs", group = "📚 文档" },
    { message = "^style", group = "🎨 样式" },
    { message = "^refactor", group = "♻️ 重构" },
    { message = "^perf", group = "⚡ 性能" },
    { message = "^test", group = "✅ 测试" },
    { message = "^chore", group = "🔧 杂项" },
    { message = "^ci", group = "🤖 CI/CD" },
    { message = "^build", group = "📦 构建" },
    { message = ".*", group = "📝 其他" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
sort_commits = "newest"
