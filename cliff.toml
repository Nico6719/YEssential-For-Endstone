# git-cliff configuration for YEssential
[changelog]
header = "# Changelog\n\nAll notable changes to YEssential will be documented in this file.\n"
body = """
{%- if version -%}
    ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}
    {%- endfor -%}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
commit_parsers = [
    { message = "^feat", group = "🚀 新功能" },
    { message = "^fix", group = "🐛 修复" },
    { message = "^docs", group = "📚 文档" },
    { message = "^refactor", group = "♻️ 重构" },
    { message = "^perf", group = "⚡ 性能" },
    { message = "^chore", group = "🔧 杂项" },
    { message = "^ci", group = "🤖 CI/CD" },
    { message = ".*", group = "📝 其他" },
]
sort_commits = "newest"
