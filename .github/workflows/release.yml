name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Wheel
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Get version from constant.py
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import re;c=open('src/endstone_yessential/constant.py').read();m=re.search(r'plugin_version\s*=\s*\"(.+?)\"',c);print(m.group(1) if m else '0.0.0')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: YEssential-${{ steps.version.outputs.version }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          if [ -f CHANGELOG.md ]; then
            BODY=$(awk -v ver="$VERSION" '
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]")) found=1
                next
              }
              found { print }
            ' CHANGELOG.md)

            if [ -z "$BODY" ]; then
              BODY="详见 CHANGELOG.md"
            fi
          else
            BODY="YEssential v${VERSION}"
          fi

          # 追加 Full Changelog 链接
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}"$'\n\n'"**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
          fi

          # 通过 GitHub Compare API 获取真实用户名
          if [ -n "$PREV_TAG" ]; then
            AUTHORS=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" \
              --jq '[.commits[].author.login] | unique | map("@" + .) | join(" ")' 2>/dev/null || echo "")
          else
            AUTHORS=$(gh api "repos/${{ github.repository }}/commits?per_page=100" \
              --jq '[.[].author.login] | unique | map("@" + .) | join(" ")' 2>/dev/null || echo "")
          fi
          fi
          if [ -n "$AUTHORS" ]; then
            BODY="${BODY}"$'\n\n'"**Contributors**: ${AUTHORS}"
          fi

          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
